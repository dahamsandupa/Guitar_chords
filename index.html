<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Chords - Universal Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --primary: #1a2a3a; --accent: #3498db; --success: #2ecc71; --bg: #f8f9fa; 
            --danger: #e74c3c; --orange: #e67e22; --chrome: #4285f4; 
        }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Navigation */
        .navbar { 
            background: var(--primary); display: flex; justify-content: center; 
            padding: 10px; position: sticky; top: 0; z-index: 1000; flex-wrap: wrap;
        }
        .tab-btn { 
            background: none; border: none; color: white; padding: 10px 15px; 
            cursor: pointer; font-size: 0.9rem; font-weight: bold; border-radius: 5px; 
            text-transform: uppercase; margin: 5px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); }
        
        .container { max-width: 1000px; margin: 15px auto; padding: 0 15px; box-sizing: border-box; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; 
        }

        input, textarea { 
            padding: 12px; border: 2px solid #ddd; border-radius: 8px; 
            width: 100%; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; 
        }
        
        .song-title { 
            font-size: clamp(1.5rem, 5vw, 2.5rem); 
            font-weight: 900; color: #000; text-transform: uppercase; 
            text-align: center; border-bottom: 4px solid #000; 
            padding-bottom: 10px; margin-bottom: 20px; 
        }

        .section-label { 
            font-size: 0.9rem; font-weight: bold; color: #fff; background: #333; 
            padding: 5px 12px; border-radius: 4px; display: inline-block; margin-bottom: 10px; 
        }
        
        .chord-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 10px; margin-bottom: 20px;
        }

        .chord-box { 
            background: #fff; border: 1.5px solid #eee; border-left: 4px solid var(--accent);
            padding: clamp(8px, 2vw, 15px); text-align: center; border-radius: 6px;
            font-size: clamp(1.1rem, 4.5vw, 2.2rem); 
            font-family: 'Courier New', monospace; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            min-height: 50px;
        }
        .chord-box:hover { background: #f0f7ff; border-color: var(--accent); }

        /* Superscript (m, #, b, 7) වල size එක මෙතැනින් පාලනය වේ */
        .chord-box span.sup { font-size: 0.8em; vertical-align: super; color: var(--orange); margin-left: 1px; }

        .edit-input { width: 90%; font-size: 1em; text-align: center; border: 1px solid var(--accent); }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { background: var(--accent); color: white; width: 100%; }
        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 10px; }
        .action-group { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn-pdf { background: var(--danger); color: white; flex: 1; min-width: 100px; }
        .btn-img { background: var(--orange); color: white; flex: 1; min-width: 100px; }

        .download-hero { text-align: center; padding: 40px 10px; }
        .btn-chrome { background: var(--chrome); color: white; width: 100%; max-width: 400px; font-size: 1.2rem; padding: 20px; border-radius: 50px; }

        @media (max-width: 480px) {
            .container { padding: 0 10px; }
            .chord-grid { gap: 5px; }
            .card { padding: 15px; }
            .navbar { padding: 5px; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <button class="tab-btn active" onclick="openTab('addTab', this)">Editor</button>
    <button class="tab-btn" onclick="openTab('libraryTab', this)">Library</button>
    <button class="tab-btn" onclick="openTab('downTab', this)">Download HTML</button>
</div>

<div class="container">
    <div id="addTab" class="tab-content active">
        <div class="card">
            <h3>Song Creator</h3>
            <input type="text" id="songName" placeholder="Song Name (Ex: Mal Mitak)">
            <button class="btn btn-add" onclick="createNewSong()">Create New</button>
        </div>

        <div class="card" id="sectionInputArea" style="display:none;">
            <p>Editing: <b id="currentActiveSong" style="color:var(--accent)">-</b></p>
            <input type="text" id="sectionName" placeholder="Section (Intro / Chorus)">
            <textarea id="bulkChords" rows="2" placeholder="Chords: G D Em C (separated by space)"></textarea>
            <button class="btn btn-add" onclick="addSectionToCurrent()">Add to Song</button>
        </div>

        <div id="previewArea" style="display:none;">
            <div class="card">
                <div id="captureArea">
                    <div id="previewTitle" class="song-title"></div>
                    <div id="sectionsContainer"></div>
                </div>
                <button class="btn btn-save" onclick="saveToLibrary()">💾 SAVE TO LIBRARY</button>
            </div>
        </div>
    </div>

    <div id="libraryTab" class="tab-content">
        <input type="text" id="libSearch" placeholder="🔍 Search songs..." onkeyup="renderLibrary()">
        <div id="libraryList"></div>
    </div>

    <div id="downTab" class="tab-content">
        <div class="card download-hero">
            <h2 style="color: var(--chrome);">Full Songbook Backup</h2>
            <p>ඔබ සතු සියලුම ගීත ඇතුළත් HTML ගොනුවක් බාගත කරන්න. මෙය ඕනෑම device එකක offline බැලිය හැක.</p>
            <br>
            <button class="btn btn-chrome" onclick="exportFullHTML()">📥 DOWNLOAD HTML FILE</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'GuitarChords_Universal_V1';
    let currentSong = { name: "", sections: [] };
    let savedSongs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let editingIdx = -1;

    function openTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'libraryTab') renderLibrary();
    }

    function createNewSong() {
        const name = document.getElementById('songName').value.trim();
        if(!name) return;
        editingIdx = -1;
        currentSong = { name, sections: [] };
        document.getElementById('currentActiveSong').innerText = name;
        document.getElementById('previewTitle').innerText = name;
        document.getElementById('sectionInputArea').style.display = 'block';
        document.getElementById('previewArea').style.display = 'block';
        renderPreview('sectionsContainer', currentSong, false);
    }

    function addSectionToCurrent() {
        const name = document.getElementById('sectionName').value.trim();
        const raw = document.getElementById('bulkChords').value.trim();
        if(!name || !raw) return;
        const chordList = raw.split(/\s+/).filter(c => c).map(c => ({ text: c }));
        currentSong.sections.push({ name, chords: chordList });
        renderPreview('sectionsContainer', currentSong, false);
        document.getElementById('sectionName').value = "";
        document.getElementById('bulkChords').value = "";
    }

    function renderPreview(targetId, songData, isLibrary, songIdx = -1) {
        const container = document.getElementById(targetId);
        container.innerHTML = songData.sections.map((sec, sIdx) => `
            <div class="section-view">
                <div class="section-label">${sec.name}</div>
                <div class="chord-grid">
                    ${sec.chords.map((c, cIdx) => `
                        <div class="chord-box" onclick="editChord(${songIdx}, ${sIdx}, ${cIdx}, this, ${isLibrary})">
                            ${formatChord(c.text)}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // නවීකරණය කළ formatChord ශ්‍රිතය - Eb, F#, G7 ආදී සියල්ල හඳුනා ගනී
    function formatChord(chord) {
        let applySup = (ch) => {
            // පළමු අකුර (A-G) වෙන් කර ඉතිරි කොටස span එකකට දමයි
            let match = ch.match(/^([A-G])(.*)/);
            return match ? `${match[1]}${match[2] ? `<span class="sup">${match[2]}</span>` : ''}` : ch;
        };
        return chord.includes('/') ? chord.split('/').map(p => applySup(p)).join('/') : applySup(chord);
    }

    function editChord(songIdx, sIdx, cIdx, element, isLibrary) {
        let songObj = isLibrary ? savedSongs[songIdx] : currentSong;
        let currentVal = songObj.sections[sIdx].chords[cIdx].text;
        element.onclick = null;
        element.innerHTML = `<input type="text" class="edit-input" value="${currentVal}" onblur="saveChordEdit(${songIdx}, ${sIdx}, ${cIdx}, this, ${isLibrary})">`;
        element.querySelector('input').focus();
    }

    function saveChordEdit(songIdx, sIdx, cIdx, input, isLibrary) {
        let newVal = input.value.trim() || "C";
        if(isLibrary) {
            savedSongs[songIdx].sections[sIdx].chords[cIdx].text = newVal;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedSongs));
            renderLibrary();
        } else {
            currentSong.sections[sIdx].chords[cIdx].text = newVal;
            renderPreview('sectionsContainer', currentSong, false);
        }
    }

    function saveToLibrary() {
        if(currentSong.sections.length === 0) return;
        savedSongs.push(JSON.parse(JSON.stringify(currentSong)));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedSongs));
        alert("Saved!");
        location.reload();
    }

    function renderLibrary() {
        const list = document.getElementById('libraryList');
        const q = document.getElementById('libSearch').value.toLowerCase();
        const filtered = savedSongs.filter(s => s.name.toLowerCase().includes(q));
        
        list.innerHTML = filtered.map((song, idx) => {
            const originalIdx = savedSongs.indexOf(song);
            return `
                <div class="card">
                    <button class="btn" style="background:red; color:white; float:right; padding:5px 10px; font-size:0.7rem;" onclick="deleteSong(${originalIdx})">DEL</button>
                    <div id="exportArea-${originalIdx}">
                        <div class="song-title">${song.name}</div>
                        <div id="songBody-${originalIdx}"></div>
                    </div>
                    <div class="action-group">
                        <button class="btn btn-pdf" onclick="downloadPDF(${originalIdx})">📄 PDF</button>
                        <button class="btn btn-img" onclick="downloadImage(${originalIdx})">📸 IMAGE</button>
                    </div>
                </div>
            `;
        }).join('');

        filtered.forEach(song => {
            const originalIdx = savedSongs.indexOf(song);
            renderPreview(`songBody-${originalIdx}`, song, true, originalIdx);
        });
    }

    function deleteSong(idx) {
        if(confirm("Delete this song?")) {
            savedSongs.splice(idx, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(savedSongs));
            renderLibrary();
        }
    }

    function downloadPDF(idx) {
        const { jsPDF } = window.jspdf;
        html2canvas(document.getElementById(`exportArea-${idx}`), { scale: 2.5 }).then(canvas => {
            const pdf = new jsPDF('p', 'mm', 'a4');
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 10, w, h);
            pdf.save(savedSongs[idx].name + ".pdf");
        });
    }

    function downloadImage(idx) {
        html2canvas(document.getElementById(`exportArea-${idx}`), { scale: 2.5 }).then(canvas => {
            const link = document.createElement('a');
            link.download = savedSongs[idx].name + '.jpg';
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }

    function exportFullHTML() {
        let content = `<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body { font-family: sans-serif; background: #f4f4f4; padding: 15px; margin:0; }
            .card { background: white; padding: 20px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            .title { font-size: 2rem; font-weight: bold; border-bottom: 4px solid black; text-align: center; padding-bottom: 10px; text-transform: uppercase; }
            .label { background: #333; color: white; padding: 4px 12px; border-radius: 4px; display: inline-block; margin: 15px 0 10px 0; font-size: 0.9rem; }
            .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .chord { font-size: 1.5rem; font-weight: bold; font-family: monospace; border-left: 5px solid #3498db; padding: 10px; background:#f9f9f9; text-align:center; }
            .sup { font-size: 0.8em; vertical-align: super; color: orange; }
            @media (max-width: 600px) { .chord { font-size: 1.1rem; padding: 8px; } .title { font-size: 1.4rem; } }
        </style></head><body><h1 style="text-align:center;">Songbook Backup</h1>`;
        
        savedSongs.forEach(song => {
            content += `<div class="card"><div class="title">${song.name}</div>`;
            song.sections.forEach(sec => {
                content += `<div class="label">${sec.name}</div><div class="grid">`;
                sec.chords.forEach(c => { content += `<div class="chord">${formatChord(c.text)}</div>`; });
                content += `</div>`;
            });
            content += `</div>`;
        });
        
        content += `</body></html>`;
        const blob = new Blob([content], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Guitar_Songbook.html';
        a.click();
    }
</script>
</body>
</html>
